<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Perpustakaan - SMK As-Syafi'iyah</title>
    
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 for Grid & Utilities -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Session Auto Redirect -->
    <script>
        if (localStorage.getItem("admin_logged_in") === "true") {
            window.location.href = "admin.html";
        } else if (localStorage.getItem("siswa_nis")) {
            window.location.href = "siswa.html";
        }
    </script>

    <style>
        /* ==================================================
           MONGODB DESIGN SYSTEM & THEME
           ================================================== */
        :root {
            --color-brand-green: #00ed64;
            --color-brand-green-dark: #008744;
            --color-brand-teal: #001e2b;
            --color-brand-teal-light: #002c3e;
            --color-canvas: #ffffff;
            --color-surface: #f9fbfa;
            --color-text-primary: #1c2d38;
            --color-text-secondary: #5c6c75;
            --color-border: #e1e5e8;
            
            --font-family: 'Euclid Circular A', 'Poppins', sans-serif;
            
            --radius-pill: 9999px;
            --radius-lg: 16px;
            --radius-md: 10px;
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.3);
        }

        body {
            font-family: var(--font-family);
            background: radial-gradient(circle at 10% 20%, var(--color-brand-teal-light) 0%, var(--color-brand-teal) 90%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 24px;
            color: #ffffff;
            overflow-y: auto;
            position: relative;
        }

        /* Library image background texture */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEiQJzmHvg3HM24L4cBiGJV_yu4mnVp6r46SxnERTPooUufS1q0bLZHPFaO6VGW5DaG205MiVql8wNJL89YCKVRAuFNJPcAp53Y1iJYboDsRXlkXsMFyti9rYaS8i17QEDebWoYdVtdY4VB7MzzKli-adLpLb_IBG37wYjoMtBLX5Btpcm9AFASc_ch3hQLG/s1600/Perpustakaan.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        /* Abstract Soft Circles for Wow Visuals */
        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.15; }
            50% { transform: translate(60px, -40px) scale(1.15); opacity: 0.22; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.15; }
        }

        .ambient-glow {
            position: absolute;
            width: 350px;
            height: 350px;
            background: var(--color-brand-green);
            filter: blur(120px);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }
        .glow-1 { top: 5%; left: 10%; animation: floatGlow 14s ease-in-out infinite; }
        .glow-2 { bottom: 5%; right: 10%; animation: floatGlow 18s ease-in-out infinite alternate; }

        /* Entrance Animation Keyframes */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Glassmorphic Container */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            box-shadow: var(--shadow-lg), 0 4px 30px rgba(0, 0, 0, 0.2);
            z-index: 10;
            position: relative;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .login-logo {
            font-size: 26px;
            font-weight: 700;
            color: var(--color-brand-green);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }
        .login-logo:hover {
            transform: scale(1.05);
        }
        .login-logo i {
            font-size: 34px;
            animation: pulseShield 2s infinite;
        }

        @keyframes pulseShield {
            0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(0, 237, 100, 0)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 8px rgba(0, 237, 100, 0.5)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(0, 237, 100, 0)); }
        }

        /* Nav Tabs for Role Selection */
        .nav-tabs-login {
            display: flex;
            background: rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-pill);
            padding: 4px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: #aab2b6;
            font-weight: 600;
            font-size: 14px;
            padding: 10px 16px;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.04);
        }
        .tab-btn.active {
            background: var(--color-brand-green);
            color: var(--color-brand-teal);
            box-shadow: 0 4px 12px rgba(0, 237, 100, 0.3);
        }

        /* Forms Styling */
        .form-label-custom {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }
        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group-custom i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aab2b6;
            font-size: 20px;
            pointer-events: none;
            transition: color 0.3s ease;
        }
        .form-control-custom {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-md);
            padding: 14px 14px 14px 48px;
            width: 100%;
            outline: none;
            font-family: inherit;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .form-control-custom::placeholder {
            color: #5c6c75;
        }
        .form-control-custom:focus {
            background: rgba(255, 255, 255, 0.09);
            border-color: var(--color-brand-green);
            box-shadow: 0 0 15px rgba(0, 237, 100, 0.25);
        }
        .input-group-custom:focus-within i {
            color: var(--color-brand-green);
        }

        /* Buttons */
        .btn-brand-primary {
            background-color: var(--color-brand-green);
            color: var(--color-brand-teal);
            border: 1px solid var(--color-brand-green);
            border-radius: var(--radius-pill);
            font-weight: 700;
            padding: 14px;
            width: 100%;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-brand-primary:hover {
            background-color: #00d359;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 237, 100, 0.35);
        }
        .btn-brand-primary:active {
            transform: translateY(-1px);
        }

        /* Toast notifications styling */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2100; display: flex; flex-direction: column; gap: 10px; }
        .custom-toast { background-color: var(--color-brand-teal-light); color: white; padding: 14px 24px; border-radius: var(--radius-md); box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 12px; transform: translateY(100px); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 1px solid rgba(255,255,255,0.05); }
        .custom-toast.show { transform: translateY(0); opacity: 1; }
        .custom-toast.success { border-left: 4px solid var(--color-brand-green); }
        .custom-toast.error { border-left: 4px solid #f87171; }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            .login-card {
                padding: 30px 20px;
                border-radius: var(--radius-md);
            }
            .login-logo {
                font-size: 22px;
                margin-bottom: 20px;
            }
            .nav-tabs-login {
                margin-bottom: 20px;
            }
            .form-control-custom {
                padding: 12px 12px 12px 42px;
                font-size: 14px;
            }
            .input-group-custom i {
                left: 14px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<!-- Ambient Glows -->
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- LOGIN CARD -->
<div class="login-card">
    <div class="login-logo" style="flex-direction: column; gap: 8px; text-align: center;">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh6yAKbfTAPVLKjJh9fLh8jPGs7BhIbqrZDwBb4TvXRExl_tozRzC6Qc_B9eoI7kttGE3GnQYlhmA7sahUpfj-KkZHZxFRTorZhodmg8O9-8wfnnwVpm4Xed5_6APiikt1fFV4cUyXsUqGOgrD0xK0nGYQeIwFs819FUgR0RS9zohUdO9zN0JCllRx-ybyx/s1280/logo%20smk%20rmv%20bg.png" alt="Logo SMK" style="height: 64px; object-fit: contain;">
        <span style="font-size: 20px; line-height: 1.2;">Perpustakaan<br><span style="font-size: 14px; color: #aab2b6; font-weight: 500;">SMK As-Syafiiyah</span></span>
    </div>

    <!-- Tab Roles -->
    <div class="nav-tabs-login">
        <button class="tab-btn active" onclick="switchTab('siswa', this)">
            <i class="ph ph-graduation-cap"></i> Anggota
        </button>
        <button class="tab-btn" onclick="switchTab('admin', this)">
            <i class="ph ph-users-three"></i> Pustakawan
        </button>
    </div>

    <!-- Login Siswa Form -->
    <div id="form-siswa" style="display: block;">
        <h5 class="mb-3" style="font-size: 16px; font-weight: 600; color: #ffffff;">Masuk Portal Anggota</h5>
        <form onsubmit="handleSiswaLogin(event)">
            <div class="mb-3">
                <label class="form-label-custom" for="siswaNis">Nomor Induk / ID Anggota (NIS/NIP)</label>
                <div class="input-group-custom">
                    <i class="ph ph-identification-card"></i>
                    <input type="text" id="siswaNis" class="form-control-custom" placeholder="Contoh: 2401001 atau NIP..." autocomplete="off" required>
                </div>
                <small style="color: #aab2b6; font-size: 11px; display: block; margin-top:-10px;">Gunakan ID Anggota Anda yang terdaftar.</small>
            </div>
            <button type="submit" class="btn-brand-primary">Masuk Portal</button>
            <div class="text-center mt-3">
                <a onclick="showRegisterForm()" style="font-size: 12px; color: var(--color-brand-green); text-decoration: none; cursor: pointer; font-weight: 500;">Belum terdaftar? Buat akun Anggota</a>
            </div>
        </form>
    </div>

    <!-- Register Member Form -->
    <div id="form-register" style="display: none;">
        <h5 class="mb-3" style="font-size: 16px; font-weight: 600; color: #ffffff;">Registrasi Anggota Baru</h5>
        <form onsubmit="handleRegisterMember(event)">
            <div class="mb-3">
                <label class="form-label-custom" for="regNis">ID Anggota / NIS / NIP</label>
                <div class="input-group-custom">
                    <i class="ph ph-identification-card"></i>
                    <input type="text" id="regNis" class="form-control-custom" placeholder="Ketik NIS atau NIP baru..." required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-custom" for="regNama">Nama Lengkap</label>
                <div class="input-group-custom">
                    <i class="ph ph-user"></i>
                    <input type="text" id="regNama" class="form-control-custom" placeholder="Nama lengkap Anda..." required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-custom" for="regTelepon">Nomor WhatsApp Aktif</label>
                <div class="input-group-custom">
                    <i class="ph ph-whatsapp-logo"></i>
                    <input type="tel" id="regTelepon" class="form-control-custom" placeholder="Contoh: 081234567890" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-custom" for="regPeran">Peran / Status</label>
                <select id="regPeran" class="form-select text-white" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); padding: 12px; width: 100%; outline: none;" onchange="toggleRegClassFields()" required>
                    <option value="Siswa" style="background:#001e2b;">Siswa</option>
                    <option value="Guru" style="background:#001e2b;">Guru</option>
                    <option value="Staf" style="background:#001e2b;">Staf</option>
                </select>
            </div>
            <div class="row mb-3" id="regClassFields">
                <div class="col-6">
                    <label class="form-label-custom" for="regKejuruan">Kejuruan</label>
                    <select id="regKejuruan" class="form-select text-white" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); padding: 12px; width: 100%; outline: none;">
                        <option value="PPLG" style="background:#001e2b;">PPLG</option>
                        <option value="AKL" style="background:#001e2b;">AKL</option>
                        <option value="MPLB 1" style="background:#001e2b;">MPLB 1</option>
                        <option value="MPLB 2" style="background:#001e2b;">MPLB 2</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label-custom" for="regTingkat">Kelas</label>
                    <select id="regTingkat" class="form-select text-white" style="background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); padding: 12px; width: 100%; outline: none;">
                        <option value="X" style="background:#001e2b;">Kelas X</option>
                        <option value="XI" style="background:#001e2b;">Kelas XI</option>
                        <option value="XII" style="background:#001e2b;">Kelas XII</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-brand-primary">Daftar Sekarang</button>
            <div class="text-center mt-3">
                <a onclick="showLoginForm()" style="font-size: 12px; color: #aab2b6; text-decoration: none; cursor: pointer;">Kembali ke halaman Login</a>
            </div>
        </form>
    </div>

    <!-- Login Admin Form -->
    <div id="form-admin" style="display: none;">
        <h5 class="mb-3" style="font-size: 16px; font-weight: 600; color: #ffffff;">Masuk Panel Pustakawan</h5>
        <form onsubmit="handleAdminLogin(event)">
            <div class="mb-3">
                <label class="form-label-custom" for="adminUsername">Username</label>
                <div class="input-group-custom">
                    <i class="ph ph-user"></i>
                    <input type="text" id="adminUsername" class="form-control-custom" placeholder="Ketik username admin..." autocomplete="off" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label-custom" for="adminPassword">Password</label>
                <div class="input-group-custom">
                    <i class="ph ph-lock-key"></i>
                    <input type="password" id="adminPassword" class="form-control-custom" placeholder="Ketik sandi..." required>
                </div>
                <small style="color: #aab2b6; font-size: 11px; display: block; margin-top:-10px;">Kredensial demo: username <code>admin</code>, password <code>admin123</code>.</small>
            </div>
            <button type="submit" class="btn-brand-primary">Masuk Panel</button>
        </form>
    </div>
</div>

<!-- SCRIPTS -->
<script>
    let apiEndpoint = localStorage.getItem("perpus_api_url") || "https://script.google.com/macros/s/AKfycbyG4IpOre7B7rUCwqZDT65qh5qrjwqJp4GIxWuR4Bh7_NsRVaKjfTTgiKcNs30SQkeNfg/exec";

    // fallback data
    let appState = {
        students: [
            { nis: "2401001", nama: "Ahmad Fauzi", kejuruan: "PPLG", tingkat: "XI", status: "Aktif", peran: "Siswa", sandi: "" },
            { nis: "2401002", nama: "Budi Santoso", kejuruan: "PPLG", tingkat: "X", status: "Aktif", peran: "Siswa", sandi: "" },
            { nis: "2401003", nama: "Siti Aminah", kejuruan: "AKL", tingkat: "XII", status: "Aktif", peran: "Siswa", sandi: "" },
            { nis: "2401004", nama: "Cici Paramida", kejuruan: "MPLB 1", tingkat: "XI", status: "Aktif", peran: "Siswa", sandi: "" },
            { nis: "2401005", nama: "Dina Lestari", kejuruan: "MPLB 2", tingkat: "XI", status: "Aktif", peran: "Siswa", sandi: "" }
        ]
    };

    // Load local storage demo state if exists
    const savedState = localStorage.getItem("perpus_demo_state");
    if (savedState) {
        try {
            const parsed = JSON.parse(savedState);
            if (parsed.students && parsed.students.length > 0) {
                appState.students = parsed.students;
            }
        } catch(e) {}
    }

    function triggerAnimation(el) {
        if (!el) return;
        el.classList.remove('animate-fade-in');
        void el.offsetWidth; // force reflow
        el.classList.add('animate-fade-in');
    }

    // Tab Switching
    function switchTab(role, button) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');

        const formSiswa = document.getElementById('form-siswa');
        const formAdmin = document.getElementById('form-admin');

        if (role === 'siswa') {
            formSiswa.style.display = 'block';
            formAdmin.style.display = 'none';
            triggerAnimation(formSiswa);
        } else {
            formSiswa.style.display = 'none';
            formAdmin.style.display = 'block';
            triggerAnimation(formAdmin);
        }
    }

    // Toast Notification System
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `custom-toast ${type}`;
        
        const icon = type === 'success' ? 'ph ph-check-circle' : 'ph ph-x-circle';
        toast.innerHTML = `<i class="${icon}" style="font-size:20px;"></i> <span>${message}</span>`;
        
        container.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 50);
        
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Asynchronously update student cache from API if configured
    async function fetchStudents() {
        if (!apiEndpoint) return;
        try {
            const apiKey = localStorage.getItem("perpus_api_key") || "SMKAS_PERPUS_KEY_2026";
            const response = await fetch(`${apiEndpoint}?action=getAll&key=${apiKey}`);
            const res = await response.json();
            if (res.success && res.students) {
                appState.students = res.students;
                let cached = {};
                try {
                    cached = JSON.parse(localStorage.getItem("perpus_demo_state")) || {};
                } catch(e) {}
                cached.students = res.students;
                localStorage.setItem("perpus_demo_state", JSON.stringify(cached));
            }
        } catch (e) {
            console.error("Gagal sinkron data siswa terbaru:", e);
        }
    }

    // Handlers
    function handleSiswaLogin(e) {
        e.preventDefault();
        const nis = document.getElementById('siswaNis').value.trim();
        
        const student = appState.students.find(s => String(s.nis) === String(nis));
        if (!student) {
            showToast("Gagal! ID Anggota tidak ditemukan.", "error");
            return;
        }

        if (student.status !== "Aktif") {
            showToast("Gagal! Status akun keanggotaan Anda tidak aktif.", "error");
            return;
        }

        if (student.peran === "Pustakawan") {
            showToast("Gagal! Akun Anda adalah Pustakawan. Gunakan tab Pustakawan.", "error");
            return;
        }

        localStorage.setItem("siswa_nis", nis);
        showToast(`Selamat datang, ${student.nama}! Mengalihkan...`, "success");
        setTimeout(() => {
            window.location.href = "siswa.html";
        }, 1000);
    }

    async function handleAdminLogin(e) {
        e.preventDefault();
        const user = document.getElementById('adminUsername').value.trim();
        const pass = document.getElementById('adminPassword').value;

        if (apiEndpoint) {
            // Server-side login via API
            try {
                const apiKey = localStorage.getItem("perpus_api_key") || "SMKAS_PERPUS_KEY_2026";
                const response = await fetch(apiEndpoint, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ 
                        action: "loginAdmin", 
                        key: apiKey,
                        payload: { user: user, pass: pass } 
                    })
                });
                const res = await response.json();
                if (res.success) {
                    localStorage.setItem("admin_logged_in", "true");
                    showToast("Login Pustakawan Berhasil! Mengalihkan...", "success");
                    setTimeout(() => {
                        window.location.href = "admin.html";
                    }, 1000);
                } else {
                    showToast(res.message || "Username atau password salah.", "error");
                }
            } catch (err) {
                console.error("Gagal login via API:", err);
                showToast("Gagal menghubungi server database. Menggunakan login lokal...", "warning");
                localAdminCheck(user, pass);
            }
        } else {
            localAdminCheck(user, pass);
        }
    }

    function localAdminCheck(user, pass) {
        const adminAccount = appState.students.find(s => s.peran === "Pustakawan" && String(s.nis) === String(user) && String(s.sandi) === String(pass));

        if ((user === "admin" && pass === "admin123") || adminAccount) {
            if (adminAccount && adminAccount.status !== "Aktif") {
                showToast("Gagal! Status akun Pustakawan Anda tidak aktif.", "error");
                return;
            }
            localStorage.setItem("admin_logged_in", "true");
            showToast("Login Pustakawan Berhasil! Mengalihkan...", "success");
            setTimeout(() => {
                window.location.href = "admin.html";
            }, 1000);
        } else {
            showToast("Username atau password salah.", "error");
        }
    }

    function showRegisterForm() {
        document.getElementById('form-siswa').style.display = 'none';
        document.getElementById('form-admin').style.display = 'none';
        const formRegister = document.getElementById('form-register');
        formRegister.style.display = 'block';
        triggerAnimation(formRegister);
        document.querySelector('.nav-tabs-login').style.display = 'none';
    }

    function showLoginForm() {
        const formSiswa = document.getElementById('form-siswa');
        formSiswa.style.display = 'block';
        triggerAnimation(formSiswa);
        document.getElementById('form-admin').style.display = 'none';
        document.getElementById('form-register').style.display = 'none';
        
        const tabs = document.querySelector('.nav-tabs-login');
        tabs.style.display = 'flex';
        triggerAnimation(tabs);
        
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
    }

    function toggleRegClassFields() {
        const role = document.getElementById('regPeran').value;
        const classFields = document.getElementById('regClassFields');
        if (role === 'Siswa') {
            classFields.style.display = 'flex';
        } else {
            classFields.style.display = 'none';
        }
    }

    async function handleRegisterMember(e) {
        e.preventDefault();
        const nis = document.getElementById('regNis').value.trim();
        const nama = document.getElementById('regNama').value.trim();
        const telepon = document.getElementById('regTelepon').value.trim();
        const peran = document.getElementById('regPeran').value;
        const kejuruan = peran === 'Siswa' ? document.getElementById('regKejuruan').value : '-';
        const tingkat = peran === 'Siswa' ? document.getElementById('regTingkat').value : '-';
        
        // Find member in master database
        const masterStudent = appState.students.find(s => String(s.nis) === String(nis));
        if (!masterStudent) {
            showToast("Gagal! ID/NIS tidak terdaftar di database master sekolah. Hubungi pustakawan.", "error");
            return;
        }

        // Verify name matches case-insensitive, ignoring extra spacing
        const cleanNameInput = nama.toLowerCase().replace(/\s+/g, ' ').trim();
        const cleanMasterName = String(masterStudent.nama || "").toLowerCase().replace(/\s+/g, ' ').trim();

        if (cleanMasterName !== cleanNameInput) {
            showToast("Gagal! Nama Lengkap tidak cocok dengan database sekolah.", "error");
            return;
        }

        // Verify if account has already been registered/activated (phone number set)
        if (masterStudent.telepon && String(masterStudent.telepon).trim() !== "") {
            showToast("Gagal! Akun ini sudah diaktifkan sebelumnya.", "error");
            return;
        }

        // Update details
        masterStudent.telepon = telepon;
        masterStudent.status = "Aktif";
        masterStudent.peran = peran;
        if (peran === 'Siswa') {
            masterStudent.kejuruan = kejuruan;
            masterStudent.tingkat = tingkat;
        } else {
            masterStudent.kejuruan = '-';
            masterStudent.tingkat = '-';
        }
        
        let savedState = {};
        try {
            savedState = JSON.parse(localStorage.getItem("perpus_demo_state")) || {};
        } catch(err) {}
        savedState.students = appState.students;
        localStorage.setItem("perpus_demo_state", JSON.stringify(savedState));

        showToast("Registrasi & Aktivasi Berhasil! Silakan login.", "success");

        if (apiEndpoint) {
            try {
                const apiKey = localStorage.getItem("perpus_api_key") || "SMKAS_PERPUS_KEY_2026";
                await fetch(apiEndpoint, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "saveStudent", key: apiKey, payload: masterStudent })
                });
            } catch(e) {
                console.error("Gagal sinkron registrasi ke API:", e);
            }
        }

        setTimeout(() => {
            showLoginForm();
            document.getElementById('siswaNis').value = nis;
        }, 1000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchStudents();
    });
</script>
</body>
</html>
